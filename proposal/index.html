<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>For Kittu ❤️</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <!-- Background Effects -->

    <div id="particles"></div>

    <!-- Music -->

    <audio id="bgMusic" loop>
        <source src="assets/music/romantic-song.mp3"
                type="audio/mpeg">
    </audio>

    <audio id="heartbeat">
        <source src="assets/music/heartbeat.mp3"
                type="audio/mpeg">
    </audio>

    <!-- =========================
         INTRO SCREEN
    ========================== -->

    <section id="introScreen">

        <div class="glass card">

            <h1 class="mainTitle">
                For Kittu ❤️
            </h1>

            <p class="subtitle">
                I made something special for you...
            </p>

            <button id="startBtn"
                    class="primaryBtn">

                Open Surprise ❤️

            </button>

        </div>

    </section>

    <!-- =========================
         STORY SCREEN
    ========================== -->

    <section id="storyScreen"
             class="hidden">

        <div class="storyCard">

            <img id="storyPhoto"
                 class="storyPhoto"
                 src="">

            <div id="storyLetter"
                 class="glass storyLetter">

            </div>

            <button id="nextBtn"
                    class="primaryBtn">

                Next ❤️

            </button>

        </div>

    </section>

    <!-- =========================
         MEMORIES SCREEN
    ========================== -->

    <section id="memoriesScreen"
             class="hidden">

        <h2 class="memoryTitle">

            Our Beautiful Memories ❤️

        </h2>

        <div class="memoryGrid">

            <img src="assets/photos/photo1.jpg"
                 class="memoryImg">

            <img src="assets/photos/photo2.jpg"
                 class="memoryImg">

            <img src="assets/photos/photo3.jpg"
                 class="memoryImg">

            <img src="assets/photos/photo4.jpg"
                 class="memoryImg">

        </div>

    </section>

    <!-- =========================
         MERGE SCREEN
    ========================== -->

    <section id="mergeScreen"
             class="hidden">

        <div id="mergeContainer">

            <img src="assets/photos/photo1.jpg"
                 class="mergePhoto p1">

            <img src="assets/photos/photo2.jpg"
                 class="mergePhoto p2">

            <img src="assets/photos/photo3.jpg"
                 class="mergePhoto p3">

            <img src="assets/photos/photo4.jpg"
                 class="mergePhoto p4">

        </div>

    </section>

    <!-- =========================
         BLAST SCREEN
    ========================== -->

    <section id="blastScreen"
             class="hidden">

        <div id="blastHeart">
            ❤
        </div>

    </section>

    <!-- =========================
         HEARTBEAT SCREEN
    ========================== -->

    <section id="heartbeatScreen"
             class="hidden">

        <div class="heartbeatBox">

            <h1>
                Kittu...
            </h1>

            <p>
                I Want To Ask You Something...
            </p>

        </div>

    </section>

    <!-- =========================
         PROPOSAL SCREEN
    ========================== -->

    <section id="proposalScreen"
             class="hidden">

        <div class="glass proposalCard">

            <h1 class="proposalTitle">

                Will You Be My Girlfriend? ❤️

            </h1>

            <div class="btnRow">

                <button id="yesBtn"
                        class="primaryBtn">

                    YES ❤️

                </button>

                <button id="noBtn"
                        class="secondaryBtn">

                    NO 😭

                </button>

            </div>

            <p id="funnyMessage">

            </p>

        </div>

    </section>

    <!-- =========================
         FINAL SCREEN
    ========================== -->

    <section id="finalScreen"
             class="hidden">

        <div class="glass card">

            <h1 class="mainTitle">

                YAYYYYY ❤️

            </h1>

            <p class="subtitle">

                This is just the beginning
                of our story...

            </p>

        </div>

    </section>

    <!-- JS -->

    <script src="js/effects.js"></script>

    <script src="js/main.js"></script>

</body>

</html>
